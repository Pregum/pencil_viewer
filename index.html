<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src https: http:;"
    />
    <title>Pencil Viewer — Open-Source .pen File Viewer</title>
    <meta name="description" content="View and inspect Pencil.dev .pen design files directly in your browser. Free, private, no sign-up. Drag & drop or share via URL." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Pencil Viewer — Open-Source .pen File Viewer" />
    <meta property="og:description" content="View Pencil.dev designs in your browser. Free, private, no sign-up. Supports flex layout, gradients, variables, and icon fonts." />
    <meta property="og:image" content="https://pregum.github.io/pencil_viewer/og-image.png" />
    <meta property="og:url" content="https://pregum.github.io/pencil_viewer/" />
    <meta property="og:site_name" content="Pencil Viewer" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Pencil Viewer — OSS .pen File Viewer" />
    <meta name="twitter:description" content="View Pencil.dev designs in your browser. Free, private, no sign-up." />
    <meta name="twitter:image" content="https://pregum.github.io/pencil_viewer/og-image.png" />
    <!-- Icon fonts: Material Symbols (Outlined/Rounded/Sharp) + Lucide webfont stub -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0&family=Material+Symbols+Sharp:opsz,wght,FILL,GRAD@24,400,0,0&display=swap"
    />
    <!-- Common design fonts preloaded -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Noto+Sans+JP:wght@100..900&family=Roboto:wght@100..900&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
