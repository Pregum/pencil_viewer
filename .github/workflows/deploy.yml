name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# 古い JS アクション(upload-pages-artifact が内部で呼ぶ upload-artifact 等)も
# Node 24 ランタイムで強制実行する。GitHub 公式が案内しているオプトイン手段。
# upstream が新しい SHA を取り込んだら不要になる。
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# GitHub Pages への Deploy に必要な権限
permissions:
  contents: read
  pages: write
  id-token: write

# 同時に複数の deploy が走らないように(古いものは待つ、実行中は中断しない)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Cloudflare Workers Share API — vars に未設定の fork では空文字になり、
          # isShareEnabled() が false を返すので Share ボタンは自動的に非表示になる
          VITE_SHARE_API_URL: ${{ vars.VITE_SHARE_API_URL }}
          VITE_AI_REVIEW_URL: ${{ vars.VITE_AI_REVIEW_URL }}

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    # PR では検証(build)のみ、main への push / 手動実行のときだけデプロイ
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
