name = "pencil-viewer-share"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# KV namespace for storing shared .pen files
[[kv_namespaces]]
binding = "PEN_FILES"
id = ""  # `npx wrangler kv namespace create PEN_FILES` で取得した ID を入れる

[vars]
# CORS で許可するオリジン
ALLOWED_ORIGIN = "https://pregum.github.io"
# 共有ファイルの有効期限（秒） — 30日
TTL_SECONDS = "2592000"
# 最大ファイルサイズ（バイト） — 5MB
MAX_SIZE = "5242880"
